name: "CI — auth-service"

on:
  push:
    branches: ["main"]
    paths:
      - "auth-service/**"
      - ".github/workflows/ci-auth-service.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "auth-service/**"
      - ".github/workflows/ci-auth-service.yml"

# Permissão mínima para upload de SARIF no GitHub Security tab
permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.24"
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: "pos2/auth-service"
  SERVICE_DIR: "auth-service"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & Unit Test
  # ───────────────────────────────────────────────────────────────────────────
  build-test:
    name: "Build & Unit Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: auth-service/go.sum

      - name: Download dependências
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Unit Tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Upload cobertura de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-auth-service
          path: auth-service/coverage.out
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Linter / Static Analysis
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: "Linter / Static Analysis"
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: auth-service/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: auth-service
          args: --timeout=5m

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Security Scan (SCA + SAST)
  #
  # Regra de bloqueio: qualquer vulnerabilidade CRITICAL (Trivy SCA) ou
  # issue HIGH/CRITICAL (gosec SAST) falha o pipeline imediatamente.
  # ───────────────────────────────────────────────────────────────────────────
  security-scan:
    name: "Security Scan (SCA + SAST)"
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: auth-service/go.sum

      # ── SCA: Trivy — vulnerabilidades em dependências ─────────────────────
      - name: "SCA — Trivy (SARIF para GitHub Security tab)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "auth-service"
          scanners: "vuln"
          format: "sarif"
          output: "trivy-sca.sarif"
          severity: "CRITICAL"
          exit-code: "0"
          ignore-unfixed: true

      - name: "Upload SARIF — Trivy SCA"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-sca.sarif
          category: trivy-sca-auth-service

      - name: "SCA — Trivy (bloqueio em CRITICAL)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "auth-service"
          scanners: "vuln"
          format: "table"
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      # ── SAST: gosec — análise estática do código Go ───────────────────────
      - name: Instalar gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: "SAST — gosec (bloqueio em HIGH/CRITICAL)"
        working-directory: auth-service
        run: |
          gosec -fmt json -out gosec.json ./... || true
          python3 << 'PYEOF'
          import json, sys, os
          if not os.path.exists('gosec.json'):
              print("gosec.json nao encontrado — ignorando"); sys.exit(0)
          data = json.load(open('gosec.json'))
          issues = data.get('Issues') or []
          bloqueantes = [
              i for i in issues
              if i.get('severity', '').upper() in ('HIGH', 'CRITICAL')
          ]
          if bloqueantes:
              print(f"[BLOQUEADO] {len(bloqueantes)} issue(s) HIGH/CRITICAL encontrado(s):")
              for i in bloqueantes:
                  print(f"  [{i['severity']}] {i['rule_id']}: {i['details']}")
                  print(f"    Arquivo: {i['file']}:{i['line']}")
              sys.exit(1)
          print(f"SAST OK — {len(issues)} issue(s) de baixa/media severidade (nao bloqueiam)")
          PYEOF

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — Docker Build, Container Scan & Push para ECR
  #
  # O push para o ECR só ocorre em push na branch main (não em PRs).
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    name: "Docker Build, Scan & Push"
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar tag da imagem
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "tag=v1.0.0-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "local_image=auth-service:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Docker Build
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.local_image }}" \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref_name }}" \
            auth-service/

      # ── Container Scan: Trivy — vulnerabilidades na imagem Docker ──────────
      - name: "Container Scan — Trivy (imagem Docker)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: ${{ steps.meta.outputs.local_image }}
          format: "table"
          exit-code: "1" # BLOQUEIA em CRITICAL
          severity: "CRITICAL"
          ignore-unfixed: true

      # ── Push para ECR (somente em push na main) ───────────────────────────
      - name: Configurar credenciais AWS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag e Push para ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          TAG="${{ steps.meta.outputs.tag }}"
          LOCAL="${{ steps.meta.outputs.local_image }}"

          docker tag "${LOCAL}" "${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"
          docker tag "${LOCAL}" "${REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"
          docker push "${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"
          docker push "${REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

          echo "Imagem publicada: ${REGISTRY}/${{ env.ECR_REPOSITORY }}:${TAG}"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — Atualizar tag da imagem no repositório GitOps
  #
  # Executa somente em push na main (não em PRs).
  # Faz checkout, atualiza a linha `image:` no deployment.yaml via sed e
  # commita com "[skip ci]" para não disparar o pipeline novamente.
  # ───────────────────────────────────────────────────────────────────────────
  update-gitops:
    name: "Atualizar tag no GitOps"
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Atualizar tag da imagem no GitOps
        run: |
          TAG="${{ needs.docker.outputs.tag }}"
          FILE="gitops/apps/auth-service/deployment.yaml"
          sed -i "s|pos2/auth-service:.*|pos2/auth-service:${TAG}|g" "${FILE}"
          echo "Tag atualizada para: ${TAG}"
          grep "image:" "${FILE}"

      - name: Commit e Push
        run: |
          TAG="${{ needs.docker.outputs.tag }}"
          git add gitops/apps/auth-service/deployment.yaml
          if ! git diff --staged --quiet; then
            git commit -m "ci(gitops): atualiza auth-service para ${TAG} [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "Nenhuma alteracao detectada — tag ja e a mais recente"
          fi
