apiVersion: v1
kind: ConfigMap
metadata:
  name: services-config
  namespace: feature-flags
data:
  AUTH_SERVICE_URL: "http://auth-service.feature-flags.svc.cluster.local:8001"
  FLAG_SERVICE_URL: "http://flag-service.feature-flags.svc.cluster.local:8002"
  TARGETING_SERVICE_URL: "http://targeting-service.feature-flags.svc.cluster.local:8003"

  AWS_REGION: "us-east-1"

  # Atualizar com o output do Terraform: terraform output sqs_queue_url
  AWS_SQS_URL: "https://sqs.us-east-1.amazonaws.com/ACCOUNT_ID/feature-flags-evaluation-sqs"

  # Atualizar com o output do Terraform: terraform output dynamodb_table_name
  AWS_DYNAMODB_TABLE: "ToggleMasterAnalytics"
