apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flag-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/jc-perroni/fiap-fase-3.git
    targetRevision: main
    path: gitops/apps/flag-service
  destination:
    server: https://kubernetes.default.svc
    namespace: feature-flags
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
